<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PHED GIS Capture App</title>

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- EXCEL + PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*{box-sizing:border-box;}
body{
  font-family:"Segoe UI",Arial,sans-serif;
  margin:0;background:#f4f6f8;overflow-x:hidden;
}
header{background:#004aad;color:white;padding:8px;text-align:center;}
footer{
  background:#004aad;color:white;text-align:center;
  padding:8px;font-size:12px;position:fixed;bottom:0;width:100%;
}
#globalError{
  width:100%;text-align:center;color:white;background:#cc0000;
  padding:8px;font-size:14px;display:none;position:fixed;
  bottom:40px;left:0;z-index:9999;
}
.container{padding:8px;margin-bottom:70px;max-width:100%;}
.card{background:white;padding:10px;border-radius:8px;margin-bottom:10px;}
input,select{
  padding:8px;width:100%;border-radius:6px;
  border:1px solid #aaa;font-size:16px;
}
button{
  padding:8px;width:100%;background:#0066ff;color:white;
  border:none;border-radius:6px;margin:3px 0;cursor:pointer;
}
button:disabled{background:#7ba6ff!important;cursor:not-allowed;}
.button-row{
  display:flex;justify-content:flex-end;gap:12px;margin-bottom:12px;
}
.button-row button{
  width:10vw;min-width:80px;padding:10px;font-weight:bold;
}
.add-asset-row{
  display:flex;justify-content:center;margin-top:12px;
}
#addAssetBtn{
  width:10vw;min-width:100px;background:#008000;font-weight:bold;
}
.table-wrapper{
  overflow-x:auto;background:white;border-radius:8px;padding:5px;
}
table{width:100%;border-collapse:collapse;}
th,td{padding:6px;text-align:center;}
th{background:#004aad;color:white;}
#dataTable tbody tr:nth-child(odd){background:#e9f3ff;}
#dataTable tbody tr:nth-child(even){background:white;}
.small-btn{padding:5px;font-size:12px;}
.captureBtn{background:#007bff;}
.edit-btn{background:#ff9900;}
.delete-btn{background:#cc0000;}
@media(max-width:480px){
  .button-row button,#addAssetBtn{width:30vw;}
}
</style>
</head>

<body>

<header>
  <h2 id="projectTitleHeader">PHED GIS Capture App</h2>
  <div id="projectDate" style="display:none"></div>
</header>

<div id="globalError"></div>

<div class="container">

  <div id="titleSection" class="card">
    <h3>Enter Project Title</h3>
    <input type="text" id="projectTitleInput" placeholder="Enter title here"/>
    <button onclick="startApp()" style="width:30%;margin:12px auto;display:block;">Start</button>
  </div>

  <div id="appContent" class="card" style="display:none">

    <!-- ✅ RESET BUTTON ADDED HERE -->
    <div class="button-row">
      <button style="background:white;color:red;border:1px solid red" onclick="resetApp()">Reset</button>
      <button style="background:white;color:black;border:1px solid blue" onclick="exportExcel()">Export Excel</button>
      <button style="background:white;color:black;border:1px solid blue" onclick="exportPDF()">Export PDF</button>
    </div>

    <div class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <th>S/N</th>
            <th>Quantity</th>        <!-- New Column -->
            <th>Asset</th>
            <th>Lat</th>
            <th>Lon</th>
            <th></th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

    <div class="add-asset-row">
      <button style="background:white;color:black;border:1px solid blue" id="addAssetBtn" onclick="addRow()">➕ Add Asset</button>
    </div>

  </div>
</div>

<footer>
  Designed by <strong>Obot Akpan</strong>
</footer>

<script>
let dataArray = [];
let globalDate = "";

/* ✅ Error Bar */
function showGlobalError(msg){
  const bar=document.getElementById("globalError");
  bar.innerHTML="⚠ "+msg;
  bar.style.display="block";
  setTimeout(()=>bar.style.display="none",3000);
}

/* ✅ Auto Save */
function saveToLocal(){
  const title=document.getElementById("projectTitleHeader").innerText;

  const saved={
    title:title,
    date:globalDate,
    data:dataArray
  };

  localStorage.setItem("gisCaptureData",JSON.stringify(saved));
}

/* ✅ Restore Previous Session */
window.onload=function(){
  const saved=localStorage.getItem("gisCaptureData");
  if(!saved) return;

  const {title,date,data} = JSON.parse(saved);
  if(!title) return;

  document.getElementById("projectTitleHeader").innerText=title;
  globalDate=date;
  document.getElementById("projectDate").innerText="Date: "+date;
  document.getElementById("projectDate").style.display="block";

  document.getElementById("titleSection").style.display="none";
  document.getElementById("appContent").style.display="block";

  dataArray=data || [];
  const tbody=document.querySelector("#dataTable tbody");
  tbody.innerHTML="";

  data.forEach(item=>{
    const row=document.createElement("tr");
    row.dataset.id=item.id;
    row.dataset.captured="true";

    row.innerHTML=`
      <td></td>
      <td><input type="number" class="qtyInput" value="${item.quantity || 1}" min="1" style="width:70px;text-align:center;" disabled></td>
      <td><select class="assetSelect" disabled><option>${item.asset}</option></select></td>
      <td>${item.lat}</td>
      <td>${item.lng}</td>
      <td>
        <button class="small-btn edit-btn" onclick="editRow(this)"><i class="fa-solid fa-pen"></i></button>
        <button class="small-btn delete-btn" onclick="deleteRow(this)"><i class="fa-solid fa-trash"></i></button>
      </td>
    `;
    tbody.appendChild(row);
  });

  updateSerialNumbers();
};

/* ✅ Warn Before Leaving */
window.onbeforeunload=function(){
  return "Your GIS data will be lost if you leave this page.";
};

/* ✅ Start App */
function startApp(){
  const title=document.getElementById("projectTitleInput").value.trim();
  if(!title) return showGlobalError("Please enter a project title.");
  document.getElementById("projectTitleHeader").innerText=title;

  /* ✅ Formatted Date */
  const d = new Date();

  let day = d.getDate();
  const suffix =
    (day >= 11 && day <= 13) ? "th" :
    (day % 10 === 1) ? "st" :
    (day % 10 === 2) ? "nd" :
    (day % 10 === 3) ? "rd" : "th";

  day = day + suffix;

  const monthNames = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
  ];

  const month = monthNames[d.getMonth()];
  const year = d.getFullYear();

  globalDate = `${day} ${month}, ${year}`;

  document.getElementById("projectDate").innerText="Date: "+globalDate;
  document.getElementById("projectDate").style.display="block";

  document.getElementById("titleSection").style.display="none";
  document.getElementById("appContent").style.display="block";

  saveToLocal();
}

/* ✅ Reset App Completely */
function resetApp(){
  if(!confirm("Are you sure you want to reset everything? This will erase all saved data.")){
    return;
  }

  localStorage.removeItem("gisCaptureData");
  dataArray = [];
  globalDate = "";

  document.querySelector("#dataTable tbody").innerHTML = "";
  document.getElementById("projectTitleInput").value = "";
  document.getElementById("projectTitleHeader").innerText = "PHED GIS Capture App";
  document.getElementById("projectDate").style.display = "none";

  document.getElementById("titleSection").style.display = "block";
  document.getElementById("appContent").style.display = "none";

  showGlobalError("✅ App reset successfully.");
}

/* ✅ Update Serial Numbers */
function updateSerialNumbers(){
  const rows=document.querySelectorAll("#dataTable tbody tr");
  rows.forEach((row,index)=>{ row.cells[0].innerText=index+1; });
}

/* ✅ Add New Row */
function addRow(){
  const last=document.querySelector("#dataTable tbody tr:last-child");
  if(last && !last.dataset.captured){
    return showGlobalError("Complete previous asset first.");
  }

  const table=document.querySelector("#dataTable tbody");
  const row=table.insertRow();
  const rowId=Date.now();
  row.dataset.id=rowId; 
  row.dataset.captured="";

  row.innerHTML=`
    <td></td>
    <td><input type="number" class="qtyInput" value="1" min="1" style="width:70px;text-align:center;"></td>
    <td>
      <select class="assetSelect">
        <option value="" disabled selected>Select Asset</option>
        <option value="Transformer">Transformer</option>
        <option value="40ft HT Pole">40ft HT Pole</option>
        <option value="34ft HT Pole">34ft HT Pole</option>
        <option value="28ft LT Pole">28ft LT Pole</option>
        <option value="33kV Gang Isolator">33kV Gang Isolator</option>
        <option value="11kV Gang Isolator">11kV Gang Isolator</option>
        <option value="Auto Recloser">Auto Recloser</option>
      </select>
    </td>
    <td colspan="2" class="captureCell">
      <button class="captureBtn small-btn" onclick="captureLocation(this)">
        <i class="fa-solid fa-location-crosshairs"></i> Capture
      </button>
    </td>
    <td>
      <button class="small-btn edit-btn" disabled onclick="editRow(this)">
        <i class="fa-solid fa-pen"></i>
      </button>
      <button class="small-btn delete-btn" onclick="deleteRow(this)">
        <i class="fa-solid fa-trash"></i>
      </button>
    </td>
  `;

  updateSerialNumbers();
  saveToLocal();
}

/* ✅ Capture GPS */
function captureLocation(btn){
  const row=btn.closest("tr");
  const asset=row.querySelector(".assetSelect");
  const qty=row.querySelector(".qtyInput");

  if(!asset.value) return showGlobalError("Select an asset first.");
  if(!qty.value || parseInt(qty.value) < 1) return showGlobalError("Enter a valid quantity.");

  navigator.geolocation.getCurrentPosition(
    pos=>{
      const lat=pos.coords.latitude.toFixed(6);
      const lng=pos.coords.longitude.toFixed(6);

      btn.parentElement.remove();
      const latCell=document.createElement("td");
      const lngCell=document.createElement("td");
      latCell.innerText=lat;
      lngCell.innerText=lng;

      row.insertBefore(latCell,row.children[3]);
      row.insertBefore(lngCell,row.children[4]);

      row.dataset.captured="true";
      asset.disabled=true;
      qty.disabled=true;
      row.querySelector(".edit-btn").disabled=false;

      dataArray=dataArray.filter(r=>r.id!==row.dataset.id);
      dataArray.push({
        id:row.dataset.id,
        quantity: parseInt(qty.value),
        asset:asset.value,
        lat:lat,
        lng:lng
      });

      saveToLocal();
    },
    ()=>showGlobalError("GPS unavailable.")
  );
}

/* ✅ Edit Row */
function editRow(btn){
  if(!confirm("Do you want to edit this record?")) return;

  const row=btn.closest("tr");
  row.dataset.captured="";
  dataArray=dataArray.filter(r=>r.id!==row.dataset.id);

  row.children[3].remove(); // remove Lat
  row.children[3].remove(); // remove Lon

  const cap=document.createElement("td");
  cap.colSpan=2; 
  cap.className="captureCell";
  cap.innerHTML=`
    <button class="captureBtn small-btn" onclick="captureLocation(this)">
      <i class="fa-solid fa-location-crosshairs"></i> Recapture
    </button>
  `;
  row.insertBefore(cap,row.children[3]);

  row.querySelector(".assetSelect").disabled=false;
  row.querySelector(".qtyInput").disabled=false;
  saveToLocal();
}

/* ✅ Delete Row */
function deleteRow(btn){
  if(!confirm("Are you sure?")) return;

  const row=btn.closest("tr");
  dataArray=dataArray.filter(r=>r.id!==row.dataset.id);
  row.remove();

  updateSerialNumbers();
  saveToLocal();
}

/* ✅ Export Excel */
function exportExcel(){
  if(dataArray.length===0) return showGlobalError("No data recorded.");

  const exportData=dataArray.map((item,i)=>({
    "S/N":i+1,
    "Quantity":item.quantity || 1,
    "Asset":item.asset,
    "Latitude":item.lat,
    "Longitude":item.lng
  }));

  const ws=XLSX.utils.json_to_sheet(exportData);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"GIS Data");
  XLSX.writeFile(wb,"GIS_Data.xlsx");

  localStorage.removeItem("gisCaptureData");
}

/* ✅ Export PDF */
function exportPDF(){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF();

  doc.text(document.getElementById("projectTitleHeader").innerText,10,10);
  doc.text("Date: "+globalDate,10,16);

  if(dataArray.length===0) return showGlobalError("No data recorded.");

  dataArray.forEach((item,i)=>{
    doc.text(`${i+1}. ${item.quantity || 1} × ${item.asset} | ${item.lat}, ${item.lng}`,10,30+i*10);
  });

  doc.save("GIS_Data.pdf");

  localStorage.removeItem("gisCaptureData");
}
</script>

</body>
</html>
