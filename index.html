<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GIS Capture App</title>

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- EXCEL + PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body {
  font-family: "Segoe UI", Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
}

header {
  background: #004aad;
  color: white;
  padding: 8px;
  text-align: center;
}

footer {
  background: #004aad;
  color: white;
  text-align: center;
  padding: 8px;
  font-size: 12px;
  position: fixed;
  bottom: 0;
  width: 100%;
}

.container {
  padding: 8px;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}

input, select {
  padding: 8px;
  width: 100%;
  border-radius: 6px;
  border: 1px solid #aaa;
}

button {
  padding: 8px;
  width: 100%;
  background: #0066ff;
  color: white;
  border: none;
  border-radius: 6px;
  margin: 3px 0;
  cursor: pointer;
}

.button-row {
  display: flex;
  gap: 6px;
}

.button-row button {
  flex: 1;
}

.table-wrapper {
  overflow-x: auto;
  background: white;
  border-radius: 8px;
  padding: 5px;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  text-align: center;
}

th {
  background: #004aad;
  color: white;
}

/* ✅ COLUMN WIDTH CONTROL */
table th:nth-child(1),
table td:nth-child(1) {
  width: 5%;
}

table th:nth-child(2),
table td:nth-child(2) {
  width: 50%; /* 3x S/N */
}

table th:nth-child(3),
table td:nth-child(3),
table th:nth-child(4),
table td:nth-child(4) {
  width: 15%;
}

table th:nth-child(5),
table td:nth-child(5) {
  width: 10%;
}

.small-btn { padding: 5px; font-size: 12px; }

.captureBtn { background: #007bff; }
.edit-btn { background: #ff9900; }
.delete-btn { background: #cc0000; }

.captureCell {
  text-align: center;
}
</style>
</head>

<body>

<header>
  <h2 id="projectTitleHeader">GIS Capture App</h2>
  <div id="projectDate" style="display:none"></div>
</header>

<div class="container">

  <div id="titleSection" class="card">
    <h3>Enter Project Title</h3>
    <input type="text" id="projectTitleInput" placeholder="Enter title here"/>
    <button onclick="startApp()">Start</button>
  </div>

  <div id="appContent" class="card" style="display:none">

    <div class="button-row">
      <button onclick="addRow()">Add Asset</button>
      <button onclick="exportExcel()">Export Excel</button>
      <button onclick="exportPDF()">Export PDF</button>
    </div>

    <div class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <th>S/N</th>
            <th>Asset</th>
            <th>Lat</th>
            <th>Long</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>

  </div>
</div>

<footer>
  Designed by <strong>Obot Akpan</strong>
</footer>

<script>
let dataArray = [];
let globalDate = "";

/* START APP */
function startApp() {
  const title = document.getElementById("projectTitleInput").value.trim();
  if (!title) return alert("Enter a project title.");

  document.getElementById("projectTitleHeader").innerText = title;

  globalDate = new Date().toLocaleDateString();
  document.getElementById("projectDate").innerText = "Date: " + globalDate;
  document.getElementById("projectDate").style.display = "block";

  document.getElementById("titleSection").style.display = "none";
  document.getElementById("appContent").style.display = "block";
}

/* SERIAL NUMBER */
function updateSerialNumbers() {
  const rows = document.querySelectorAll("#dataTable tbody tr");
  rows.forEach((row, index) => {
    row.cells[0].innerText = index + 1;
  });
}

/* ADD ROW */
function addRow() {
  const table = document.querySelector("#dataTable tbody");
  const row = table.insertRow();
  const rowId = Date.now() + Math.random();
  row.dataset.id = rowId;

  row.innerHTML = `
    <td></td>

    <td>
      <select class="assetSelect">
        <option>Transformer</option>
        <option>40ft HT Pole</option>
        <option>34ft HT Pole</option>
        <option>28ft LT Pole</option>
        <option>33kV Gang Isolator</option>
        <option>11kV Gang Isolator</option>
        <option>Auto Recloser</option>
      </select>
    </td>

    <td colspan="2" class="captureCell">
      <button class="captureBtn small-btn" onclick="captureLocation(this)">
        <i class="fa-solid fa-location-crosshairs"></i> Capture
      </button>
    </td>

    <td>
      <button class="small-btn edit-btn" onclick="editRow(this)">
        <i class="fa-solid fa-pen"></i>
      </button>
      <button class="small-btn delete-btn" onclick="deleteRow(this)">
        <i class="fa-solid fa-trash"></i>
      </button>
    </td>
  `;

  updateSerialNumbers();
}

/* CAPTURE GPS */
function captureLocation(btn) {
  const row = btn.closest("tr");

  navigator.geolocation.getCurrentPosition(
    function (pos) {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);

      const cell = btn.parentElement;
      cell.remove();

      const latCell = document.createElement("td");
      latCell.innerText = lat;

      const lngCell = document.createElement("td");
      lngCell.innerText = lng;

      row.insertBefore(latCell, row.children[2]);
      row.insertBefore(lngCell, row.children[3]);

      const rowId = row.dataset.id;
      const asset = row.querySelector(".assetSelect").value;

      dataArray = dataArray.filter(r => r.id !== rowId);
      dataArray.push({ id: rowId, asset, lat, lng });
    },
    () => alert("GPS unavailable.")
  );
}

/* EDIT ROW */
function editRow(btn) {
  const row = btn.closest("tr");

  row.children[2].remove();
  row.children[2].remove();

  const cell = document.createElement("td");
  cell.colSpan = 2;
  cell.className = "captureCell";

  cell.innerHTML = `
    <button class="captureBtn small-btn" onclick="captureLocation(this)">
      <i class="fa-solid fa-location-crosshairs"></i> Recapture
    </button>
  `;

  row.insertBefore(cell, row.children[2]);
}

/* DELETE ROW */
function deleteRow(btn) {
  const row = btn.closest("tr");
  const rowId = row.dataset.id;

  dataArray = dataArray.filter(r => r.id !== rowId);
  row.remove();
  updateSerialNumbers();
}

/* EXPORT EXCEL */
function exportExcel() {
  const exportData = dataArray.map((item, index) => ({
    "S/N": index + 1,
    Asset: item.asset,
    Latitude: item.lat,
    Longitude: item.lng
  }));

  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "GIS Data");
  XLSX.writeFile(wb, "GIS_Data.xlsx");
}

/* EXPORT PDF */
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text(document.getElementById("projectTitleHeader").innerText, 10, 10);
  doc.text("Date: " + globalDate, 10, 16);

  dataArray.forEach((item, i) => {
    doc.text(
      `${i + 1}. ${item.asset} | ${item.lat}, ${item.lng}`,
      10,
      30 + i * 10
    );
  });

  doc.save("GIS_Data.pdf");
}
</script>

</body>
</html>
