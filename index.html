<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PHED GIS Capture App</title>

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- EXCEL + PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
/* ✅ GLOBAL RESET */
* {
  box-sizing: border-box;
}

body {
  font-family: "Segoe UI", Arial, sans-serif;
  margin: 0;
  background: #f4f6f8;
  overflow-x: hidden; /* ✅ Prevent horizontal scroll */
}

header {
  background: #004aad;
  color: white;
  padding: 8px;
  text-align: center;
}

footer {
  background: #004aad;
  color: white;
  text-align: center;
  padding: 8px;
  font-size: 12px;
  position: fixed;
  bottom: 0;
  width: 100%;
}

/* ✅ GLOBAL ERROR BAR */
#globalError {
  width: 100%;
  text-align: center;
  color: white;
  background: #cc0000;
  padding: 8px;
  font-size: 14px;
  display: none;
  position: fixed;
  bottom: 40px;
  left: 0;
  z-index: 9999;
}

.container {
  padding: 8px;
  margin-bottom: 70px;
  max-width: 100%;
}

.card {
  background: white;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
  max-width: 100%;
}

input, select {
  padding: 8px;
  width: 100%;
  max-width: 100%;  /* ✅ Prevent overflow */
  border-radius: 6px;
  border: 1px solid #aaa;
  font-size: 16px;  /* ✅ Prevent mobile zoom */
}

button {
  padding: 8px;
  width: 100%;
  background: #0066ff;
  color: white;
  border: none;
  border-radius: 6px;
  margin: 3px 0;
  cursor: pointer;
}

button:disabled {
  background: #7ba6ff !important;
  cursor: not-allowed;
}

/* ✅ Export Buttons (RIGHT‑ALIGNED + 10% WIDTH) */
.button-row {
  display: flex;
  justify-content: flex-end;
  gap: 12px;
  margin-bottom: 12px;
}

.button-row button {
  width: 10vw;
  min-width: 80px;
  padding: 10px;
  font-weight: bold;
}

/* ✅ Centered Add Asset Button */
.add-asset-row {
  display: flex;
  justify-content: center;
  margin-top: 12px;
}

#addAssetBtn {
  width: 10vw;
  min-width: 100px;
  background: #008000;
  font-weight: bold;
}

.table-wrapper {
  overflow-x: auto;
  background: white;
  border-radius: 8px;
  padding: 5px;
  max-width: 100%;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  padding: 6px;
  text-align: center;
}

th {
  background: #004aad;
  color: white;
}

#dataTable tbody tr:nth-child(odd) {
  background: #e9f3ff;
}

#dataTable tbody tr:nth-child(even) {
  background: #ffffff;
}

.small-btn { padding: 5px; font-size: 12px; }
.captureBtn { background: #007bff; }
.edit-btn { background: #ff9900; }
.delete-btn { background: #cc0000; }

.captureCell {
  text-align: center;
}

/* ✅ MOBILE FIXES */
@media (max-width: 480px) {
  .card, .container {
    padding: 8px;
  }

  input, select {
    font-size: 16px;
  }

  .button-row button, #addAssetBtn {
    width: 30vw; /* Bigger buttons on small screens */
  }
}
</style>
</head>

<body>

<header>
  <h2 id="projectTitleHeader">PHED GIS Capture App</h2>
  <div id="projectDate" style="display:none"></div>
</header>

<div id="globalError"></div>

<div class="container">

  <div id="titleSection" class="card">
  <h3>Enter Project Title</h3>
  <input type="text" id="projectTitleInput" placeholder="Enter title here"/>

  <button 
    onclick="startApp()"
    style="
      width:30%;
      display:block;
      margin:12px auto;
      text-align:center;
    "
  >
    Start
  </button>
</div>
  <div id="appContent" class="card" style="display:none">

    <!-- ✅ Export Buttons -->
    <div class="button-row">
      <button onclick="exportExcel()">Excel</button>
      <button onclick="exportPDF()">PDF</button>
    </div>

    <div class="table-wrapper">
      <table id="dataTable">

        <colgroup>
          <col style="width: 5%;">
          <col style="width: 45%;">
          <col style="width: 20%;">
          <col style="width: 20%;">
          <col style="width: 10%;">
        </colgroup>

        <thead>
          <tr>
            <th>S/N</th>
            <th>Asset</th>
            <th>Lat</th>
            <th>Long</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody></tbody>
      </table>
    </div>

    <!-- ✅ Centered + 10% width Add Asset Button -->
    <div class="add-asset-row">
      <button id="addAssetBtn" onclick="addRow()">➕ Add Asset</button>
    </div>

  </div>
</div>

<footer>
  Designed by <strong>Obot Akpan</strong>
</footer>

<script>
let dataArray = [];
let globalDate = "";

/* ✅ GLOBAL ERROR MESSAGE */
function showGlobalError(msg) {
  const bar = document.getElementById("globalError");
  bar.innerHTML = "⚠ " + msg;
  bar.style.display = "block";
  setTimeout(() => bar.style.display = "none", 3000);
}

/* ✅ START APP */
function startApp() {
  const title = document.getElementById("projectTitleInput").value.trim();
  if (!title) return showGlobalError("Please enter a project title.");

  document.getElementById("projectTitleHeader").innerText = title;
  globalDate = new Date().toLocaleDateString();
  document.getElementById("projectDate").innerText = "Date: " + globalDate;
  document.getElementById("projectDate").style.display = "block";

  document.getElementById("titleSection").style.display = "none";
  document.getElementById("appContent").style.display = "block";
}

/* ✅ UPDATE S/N */
function updateSerialNumbers() {
  const rows = document.querySelectorAll("#dataTable tbody tr");
  rows.forEach((row, index) => {
    row.cells[0].innerText = index + 1;
  });
}

/* ✅ ADD ROW */
function addRow() {
  const lastRow = document.querySelector("#dataTable tbody tr:last-child");

  if (lastRow && !lastRow.dataset.captured) {
    return showGlobalError("Complete the previous asset before adding a new one.");
  }

  const table = document.querySelector("#dataTable tbody");
  const row = table.insertRow();
  const rowId = Date.now();
  row.dataset.id = rowId;
  row.dataset.captured = "";

  row.innerHTML = `
    <td></td>

    <td>
      <select class="assetSelect">
        <option value="" disabled selected>Select Asset</option>
        <option value="Transformer">Transformer</option>
        <option value="40ft HT Pole">40ft HT Pole</option>
        <option value="34ft HT Pole">34ft HT Pole</option>
        <option value="28ft LT Pole">28ft LT Pole</option>
        <option value="33kV Gang Isolator">33kV Gang Isolator</option>
        <option value="11kV Gang Isolator">11kV Gang Isolator</option>
        <option value="Auto Recloser">Auto Recloser</option>
      </select>
    </td>

    <td colspan="2" class="captureCell">
      <button class="captureBtn small-btn" onclick="captureLocation(this)">
        <i class="fa-solid fa-location-crosshairs"></i> Capture
      </button>
    </td>

    <td>
      <button class="small-btn edit-btn" onclick="editRow(this)" disabled>
        <i class="fa-solid fa-pen"></i>
      </button>
      <button class="small-btn delete-btn" onclick="deleteRow(this)">
        <i class="fa-solid fa-trash"></i>
      </button>
    </td>
  `;

  updateSerialNumbers();
}

/* ✅ CAPTURE GPS */
function captureLocation(btn) {
  const row = btn.closest("tr");
  const assetSelect = row.querySelector(".assetSelect");

  if (!assetSelect.value) return showGlobalError("Please select an asset first.");

  navigator.geolocation.getCurrentPosition(
    pos => {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);

      btn.parentElement.remove();

      const latCell = document.createElement("td");
      latCell.innerText = lat;

      const lngCell = document.createElement("td");
      lngCell.innerText = lng;

      row.insertBefore(latCell, row.children[2]);
      row.insertBefore(lngCell, row.children[3]);

      row.dataset.captured = "true";
      assetSelect.disabled = true;
      row.querySelector(".edit-btn").disabled = false;

      dataArray = dataArray.filter(r => r.id !== row.dataset.id);
      dataArray.push({ id: row.dataset.id, asset: assetSelect.value, lat, lng });
    },

    () => showGlobalError("GPS unavailable.")
  );
}

/* ✅ EDIT ROW */
function editRow(btn) {
  const row = btn.closest("tr");
  row.dataset.captured = "";

  dataArray = dataArray.filter(r => r.id !== row.dataset.id);

  row.children[2].remove();
  row.children[2].remove();

  const cap = document.createElement("td");
  cap.colSpan = 2;
  cap.className = "captureCell";
  cap.innerHTML = `
    <button class="captureBtn small-btn" onclick="captureLocation(this)">
      <i class="fa-solid fa-location-crosshairs"></i> Recapture
    </button>
  `;

  row.insertBefore(cap, row.children[2]);
  row.querySelector(".assetSelect").disabled = false;
}

/* ✅ DELETE ROW */
function deleteRow(btn) {
  const row = btn.closest("tr");
  dataArray = dataArray.filter(r => r.id !== row.dataset.id);
  row.remove();
  updateSerialNumbers();
}

/* ✅ EXPORT EXCEL */
function exportExcel() {
  if (dataArray.length === 0) {
    return showGlobalError("No data recorded.");
  }

  const exportData = dataArray.map((item, index) => ({
    "S/N": index + 1,
    Asset: item.asset,
    Latitude: item.lat,
    Longitude: item.lng
  }));

  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "GIS Data");
  XLSX.writeFile(wb, "GIS_Data.xlsx");
}

/* ✅ EXPORT PDF */
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text(document.getElementById("projectTitleHeader").innerText, 10, 10);
  doc.text("Date: " + globalDate, 10, 16);

  if (dataArray.length === 0) {
    return showGlobalError("No data recorded.");
  }

  dataArray.forEach((item, i) => {
    doc.text(`${i + 1}. ${item.asset} | ${item.lat}, ${item.lng}`, 10, 30 + i * 10);
  });

  doc.save("GIS_Data.pdf");
}
</script>

</body>
</html>
