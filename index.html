<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIS Capture App</title>

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- EXCEL + PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    padding: 0;
    background: #f4f6f8;
  }

  header {
    background: #004aad;
    color: white;
    padding: 8px 0;
    text-align: center;
  }

  footer {
    background: #004aad;
    color: white;
    text-align: center;
    padding: 8px 0;
    font-size: 12px;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
  }

  .container {
    padding: 8px;
  }

  .card {
    background: white;
    padding: 10px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    margin-bottom: 10px;
  }

  input, select {
    padding: 8px;
    width: 100%;
    border-radius: 6px;
    border: 1px solid #aaa;
    font-size: 14px;
  }

  button {
    padding: 8px;
    width: 100%;
    background: #0066ff;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }

  .small-btn { padding: 5px; font-size: 12px; }

  .captureBtn { background: #007bff; }
  .edit-btn { background: #ff9900; }
  .delete-btn { background: #cc0000; }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 6px;
    font-size: 13px;
  }

  th, td {
    padding: 6px;
    text-align: center;
  }

  th {
    background: #004aad;
    color: white;
  }
</style>
</head>

<body>

<header>
  <h2 id="projectTitleHeader">GIS Capture App</h2>
  <div id="projectDate" style="display:none"></div>
</header>

<div class="container">
  <div id="titleSection" class="card">
    <h3>Enter Project Title</h3>
    <input type="text" id="projectTitleInput" placeholder="Enter title here">
    <br><br>
    <button onclick="startApp()">Start</button>
  </div>

  <div id="appContent" class="card" style="display:none">
    <div class="button-row">
      <button onclick="addRow()">Add Asset</button>
      <button onclick="exportExcel()">Export Excel</button>
      <button onclick="exportPDF()">Export PDF</button>
    </div>

    <table id="dataTable">
      <thead>
        <tr>
          <th>S/N</th>
          <th>Asset</th>
          <th colspan="2">Location Capture</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<footer>
  Designed by <strong>Obot Akpan</strong>
</footer>

<script>
let dataArray = [];
let globalDate = "";

/* Start App */
function startApp() {
  const title = document.getElementById("projectTitleInput").value.trim();
  if (!title) return alert("Enter a project title.");

  document.getElementById("projectTitleHeader").innerText = title;
  globalDate = new Date().toLocaleDateString();
  document.getElementById("projectDate").innerText = "Date: " + globalDate;
  document.getElementById("projectDate").style.display = "block";

  document.getElementById("titleSection").style.display = "none";
  document.getElementById("appContent").style.display = "block";
}

/* Update S/N */
function updateSerialNumbers() {
  const rows = document.querySelectorAll("#dataTable tbody tr");
  rows.forEach((row, index) => {
    row.querySelector("td").innerText = index + 1;
  });
}

/* Add Row */
function addRow() {
  const table = document.querySelector("#dataTable tbody");
  const row = table.insertRow();
  const rowId = Date.now() + Math.random();
  row.dataset.id = rowId;

  row.innerHTML = `
    <td></td>

    <td>
      <select class="assetSelect">
        <option value="Transformer">Transformer</option>
        <option value="40ft HT Pole">40ft HT Pole</option>
        <option value="34ft HT Pole">34ft HT Pole</option>
        <option value="28ft LT Pole">28ft LT Pole</option>
        <option value="33kV Gang Isolator">33kV Gang Isolator</option>
        <option value="11kV Gang Isolator">11kV Gang Isolator</option>
        <option value="Auto Recloser">Auto Recloser</option>
      </select>
    </td>

    <td colspan="2">
      <button class="captureBtn small-btn" onclick="captureLocation(this)">
        CAPTURE
      </button>
      <div style="margin-top:5px; font-size:12px;">
        <span class="latValue"></span><br>
        <span class="lngValue"></span>
      </div>
    </td>

    <td>
      <button class="small-btn edit-btn" onclick="editRow(this)">Edit</button>
      <button class="small-btn delete-btn" onclick="deleteRow(this)">Delete</button>
    </td>
  `;

  updateSerialNumbers();
}

/* Capture GPS */
function captureLocation(btn) {
  const row = btn.closest("tr");

  navigator.geolocation.getCurrentPosition(
    function (pos) {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);

      row.querySelector(".latValue").innerText = "Lat: " + lat;
      row.querySelector(".lngValue").innerText = "Lng: " + lng;

      btn.style.display = "none";

      const rowId = row.dataset.id;
      const asset = row.querySelector(".assetSelect").value;

      dataArray = dataArray.filter(r => r.id !== rowId);
      dataArray.push({ id: rowId, asset, lat, lng });
    },
    () => alert("GPS unavailable.")
  );
}

/* Edit Row */
function editRow(btn) {
  const row = btn.closest("tr");
  row.querySelector(".captureBtn").style.display = "inline";
  row.querySelector(".assetSelect").disabled = false;
}

/* Delete Row */
function deleteRow(btn) {
  const row = btn.closest("tr");
  dataArray = dataArray.filter(r => r.id !== row.dataset.id);
  row.remove();
  updateSerialNumbers();
}

/* Excel Export */
function exportExcel() {
  const exportData = dataArray.map((item, index) => ({
    "S/N": index + 1,
    Asset: item.asset,
    Latitude: item.lat,
    Longitude: item.lng
  }));

  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "GIS Data");
  XLSX.writeFile(wb, "GIS_Data.xlsx");
}

/* PDF Export */
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text(document.getElementById("projectTitleHeader").innerText, 10, 10);
  doc.text("Date: " + globalDate, 10, 16);

  dataArray.forEach((item, i) => {
    doc.text(`${i + 1}. ${item.asset} | ${item.lat}, ${item.lng}`, 10, 30 + i * 10);
  });

  doc.save("GIS_Data.pdf");
}
</script>

</body>
</html>
