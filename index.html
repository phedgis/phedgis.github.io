<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PHED GIS Capture App</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      background: #f4f6f8;
      color: #333;
    }

    header {
      background: #004aad;
      color: white;
      padding: 20px;
      text-align: center;
    }

    h2 { margin-bottom: 10px; }

    .container {
      padding: 25px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-bottom: 20px;
    }

    input, select {
      padding: 10px;
      width: 60%;
      border-radius: 6px;
      border: 1px solid #aaa;
      margin-top: 10px;
    }

    button {
      padding: 10px 16px;
      background: #0066ff;
      border: none;
      color: white;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
      font-size: 14px;
      margin: 5px;
    }

    button:hover {
      background: #004ec2;
    }

    button:disabled {
      background: #ccc !important;
      color: #666;
      cursor: not-allowed !important;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
      background: white;
      border-radius: 10px;
      overflow: hidden;
    }

    th {
      background: #004aad;
      color: white;
      padding: 12px;
    }

    td {
      padding: 10px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    footer {
      background: #004aad;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<header>
  <h2 id="projectTitleHeader">GIS Capture App</h2>
</header>

<div class="container">

  <!-- ✅ Title Input Screen -->
  <div id="titleSection" class="card">
    <h3>Enter Project Title</h3>
    <input type="text" id="projectTitleInput" placeholder="Enter title here">
    <br><br>
    <button onclick="startApp(this)">Start</button>
  </div>

  <!-- ✅ Main App Section -->
  <div id="appContent" class="card" style="display:none;">
    <button onclick="addRow()">Add Row</button>
    <button onclick="exportExcel()">Export Excel</button>
    <button onclick="exportPDF()">Export PDF</button>

    <table id="dataTable">
      <thead>
        <tr>
          <th>Asset</th>
          <th>Asset Description</th>
          <th>GIS Capture</th>
          <th>Latitude</th>
          <th>Longitude</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

<footer>
  Designed by <strong>Obot Akpan</strong>
</footer>

<script>
let dataArray = [];

/* ✅ Title Setup */
function startApp(btn) {
  const title = document.getElementById("projectTitleInput").value.trim();
  if (!title) return alert("Please enter a title first.");

  document.getElementById("projectTitleHeader").innerText = title;

  document.getElementById("titleSection").style.display = "none";
  document.getElementById("appContent").style.display = "block";
}

/* ✅ Add Table Row */
function addRow() {
  const table = document.querySelector("#dataTable tbody");
  const row = table.insertRow();

  row.innerHTML = `
    <td>
      <select class="assetSelect">
        <option value="Transformer">Transformer</option>
        <option value="HT Pole">HT Pole</option>
        <option value="LT Pole">LT Pole</option>
      </select>
    </td>
    <td><input type="text" class="assetDesc" placeholder="Enter description"></td>
    <td><button onclick="captureLocation(this)">Capture</button></td>
    <td class="latCell"></td>
    <td class="lngCell"></td>
    <td class="dateCell"></td>
  `;
}

/* ✅ Capture GPS for specific row */
function captureLocation(button) {
  const row = button.closest("tr");

  const asset = row.querySelector(".assetSelect").value;
  const desc = row.querySelector(".assetDesc").value;

  navigator.geolocation.getCurrentPosition(function(pos) {
    const lat = pos.coords.latitude.toFixed(6);
    const lng = pos.coords.longitude.toFixed(6);
    const date = new Date().toLocaleString();

    row.querySelector(".latCell").innerText = lat;
    row.querySelector(".lngCell").innerText = lng;
    row.querySelector(".dateCell").innerText = date;

    // ✅ Disable and gray out button
    button.disabled = true;
    button.innerText = "Captured";

    dataArray.push({ asset, desc, lat, lng, date });

  }, function() {
    alert("Unable to retrieve location");
  });
}

/* ✅ Export Excel */
function exportExcel() {
  const ws = XLSX.utils.json_to_sheet(dataArray);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "GIS Data");
  XLSX.writeFile(wb, "GIS_Data.xlsx");
}

/* ✅ Export PDF */
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text(document.getElementById("projectTitleHeader").innerText, 10, 10);

  dataArray.forEach((item, i) => {
    doc.text(
      `${item.asset} | ${item.desc} | ${item.lat}, ${item.lng} | ${item.date}`,
      10, 20 + (i * 10)
    );
  });

  doc.save("GIS_Data.pdf");
}
</script>

</body>
</html>
