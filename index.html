<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIS Capture App</title>

  <!-- FONT AWESOME -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- EXCEL + PDF -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
  body {
    font-family: "Segoe UI", Arial, sans-serif;
    margin: 0;
    padding: 0;                /* ✅ Remove extra body padding */
    background: #f4f6f8;
  }

  header {
    background: #004aad;
    color: white;
    padding: 8px 0;            /* ✅ Reduced header padding */
    text-align: center;
  }

  footer {
    background: #004aad;
    color: white;
    text-align: center;
    padding: 8px 0;            /* ✅ Reduced footer padding */
    font-size: 12px;
    position: fixed;
    bottom: 0;
    left: 0;
    width: 100%;
  }

  .container {
    padding: 8px;              /* ✅ Reduced container padding */
  }

  .card {
    background: white;
    padding: 10px;             /* ✅ Much smaller card padding */
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    margin-bottom: 10px;       /* ✅ Reduced spacing between cards */
  }

  h3 {
    margin-top: 0;
    margin-bottom: 6px;        /* ✅ Tighten heading space */
  }

  input,
  select {
    padding: 8px;              /* ✅ Smaller input field padding */
    width: 100%;
    border-radius: 6px;
    border: 1px solid #aaa;
    font-size: 14px;           /* ✅ Slightly reduced font */
  }

  button {
    padding: 8px;              /* ✅ Smaller buttons */
    width: 100%;
    background: #0066ff;
    border: none;
    color: white;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    margin: 3px 0;             /* ✅ Reduced vertical spacing */
  }

  .button-row {
    display: flex;
    gap: 6px;                  /* ✅ Smaller gap */
    margin-bottom: 6px;
    flex-wrap: wrap;
  }

  .button-row button {
    flex: 1 1 calc(33.33% - 6px);
  }

  .table-wrapper {
    overflow-x: auto;
    background: white;
    border-radius: 8px;
    padding: 5px;              /* ✅ Reduced table wrapper padding */
  }

  table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 6px;           /* ✅ Smaller top margin */
    font-size: 13px;
    table-layout: fixed;
  }

  th, td {
    padding: 6px;              /* ✅ Smaller cell padding */
    word-wrap: break-word;
    text-align: center;
  }

  th {
    background: #004aad;
    color: white;
  }

  .small-btn { padding: 4px; font-size: 11px; }
  .small-btn i { font-size: 14px; }

  .captureBtn { background: #007bff; }
  .edit-btn { background: #ff9900; }
  .delete-btn { background: #cc0000; }

  .locked td {
    background: #d9d9d9 !important;
    color: #666 !important;
    pointer-events: none !important;
  }

  .locked td:last-child {
    pointer-events: auto !important;
    background: #e2e2e2 !important;
  }

  /* ✅ Column widths */
  table th:nth-child(1),
  table td:nth-child(1),
  table th:nth-child(3),
  table td:nth-child(3),
  table th:nth-child(4),
  table td:nth-child(4),
  table th:nth-child(5),
  table td:nth-child(5),
  table th:nth-child(6),
  table td:nth-child(6) {
    width: 11%;
  }

  table th:nth-child(2),
  table td:nth-child(2) {
    width: 33%;
  }
</style>
</head>

<body>

<header>
  <h2 id="projectTitleHeader">GIS Capture App</h2>
  <div id="projectDate" style="display: none"></div>
</header>

<div class="container">
  <div id="titleSection" class="card">
    <h3>Enter Project Title</h3>
    <input type="text" id="projectTitleInput" placeholder="Enter title here" />
    <br /><br />
    <button onclick="startApp()">Start</button>
  </div>

  <div id="appContent" class="card" style="display: none">
    <div class="button-row">
      <button onclick="addRow()">Add Asset</button>
      <button onclick="exportExcel()">Export Excel</button>
      <button onclick="exportPDF()">Export PDF</button>
    </div>

    <div class="table-wrapper">
      <table id="dataTable">
        <thead>
          <tr>
            <th>S/N</th>
            <th>Asset</th>
            <th>Desc</th>
            <th>Lat</th>
            <th>Long</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>

<footer>
  Designed by <strong>Obot Akpan</strong>
</footer>

<script>
let dataArray = [];
let globalDate = "";

/* Start App */
function startApp() {
  const title = document.getElementById("projectTitleInput").value.trim();
  if (!title) return alert("Enter a project title.");

  document.getElementById("projectTitleHeader").innerText = title;
  globalDate = new Date().toLocaleDateString();
  document.getElementById("projectDate").innerText = "Date: " + globalDate;
  document.getElementById("projectDate").style.display = "block";

  document.getElementById("titleSection").style.display = "none";
  document.getElementById("appContent").style.display = "block";
}

/* Update Serial Numbers */
function updateSerialNumbers() {
  const rows = document.querySelectorAll("#dataTable tbody tr");
  rows.forEach((row, index) => {
    row.querySelector("td").innerText = index + 1;
  });
}

/* Add Row */
function addRow() {
  const table = document.querySelector("#dataTable tbody");
  const row = table.insertRow();
  const rowId = Date.now() + Math.random();
  row.dataset.id = rowId;

  row.innerHTML = `
    <td></td>
    <td>
      <select class="assetSelect">
        <option value="Transformer">Transformer</option>
        <option value="HT Pole">HT Pole</option>
        <option value="LT Pole">LT Pole</option>
      </select>
    </td>

    <td><input type="text" class="assetDesc" placeholder="Enter description"></td>

    <td class="latCell">
      <button class="captureBtn small-btn" onclick="captureLocation(this)">
        <i class="fa-solid fa-location-crosshairs"></i>
      </button>
      <span class="latValue" style="display:none;"></span>
    </td>

    <td class="lngCell">
      <span class="lngValue" style="display:none;"></span>
    </td>

    <td>
      <button class="small-btn edit-btn" onclick="editRow(this)">
        <i class="fa-solid fa-pen"></i>
      </button>
      <button class="small-btn delete-btn" onclick="deleteRow(this)">
        <i class="fa-solid fa-trash"></i>
      </button>
    </td>
  `;

  updateSerialNumbers();
}

/* Capture GPS */
function captureLocation(btn) {
  const row = btn.closest("tr");

  navigator.geolocation.getCurrentPosition(
    function (pos) {
      const lat = pos.coords.latitude.toFixed(6);
      const lng = pos.coords.longitude.toFixed(6);

      row.querySelector(".latValue").innerText = lat;
      row.querySelector(".lngValue").innerText = lng;

      btn.style.display = "none";
      row.querySelector(".latValue").style.display = "inline";
      row.querySelector(".lngValue").style.display = "inline";

      const rowId = row.dataset.id;
      const asset = row.querySelector(".assetSelect").value;
      const desc = row.querySelector(".assetDesc").value;

      dataArray = dataArray.filter(r => r.id !== rowId);
      dataArray.push({ id: rowId, asset, desc, lat, lng });
    },
    () => alert("GPS unavailable.")
  );
}

/* Edit Row */
function editRow(btn) {
  const row = btn.closest("tr");

  row.querySelector(".latValue").style.display = "none";
  row.querySelector(".lngValue").style.display = "none";
  row.querySelector(".captureBtn").style.display = "inline";

  row.querySelector(".assetSelect").disabled = false;
  row.querySelector(".assetDesc").disabled = false;
}

/* Delete Row */
function deleteRow(btn) {
  const row = btn.closest("tr");
  const rowId = row.dataset.id;

  dataArray = dataArray.filter(r => r.id !== rowId);

  row.remove();
  updateSerialNumbers();
}

/* Export Excel */
function exportExcel() {
  const exportData = dataArray.map((item, index) => ({
    "S/N": index + 1,
    Asset: item.asset,
    Description: item.desc,
    Latitude: item.lat,
    Longitude: item.lng,
  }));

  const ws = XLSX.utils.json_to_sheet(exportData);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "GIS Data");
  XLSX.writeFile(wb, "GIS_Data.xlsx");
}

/* Export PDF */
function exportPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  doc.text(document.getElementById("projectTitleHeader").innerText, 10, 10);
  doc.text("Date: " + globalDate, 10, 16);

  dataArray.forEach((item, i) => {
    doc.text(
      `${i + 1}. ${item.asset} | ${item.desc} | ${item.lat}, ${item.lng}`,
      10,
      30 + i * 10
    );
  });

  doc.save("GIS_Data.pdf");
}
</script>

</body>
</html>
